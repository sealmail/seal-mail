name: Release

# Push a `v*` tag (e.g. `v0.1.0`) to build standalone clients and publish them to
# the matching GitHub Release:
#   - macOS : .dmg for Apple Silicon (aarch64) and Intel (x64)
#   - Windows: standalone .zip plus an NSIS installer
# Asset names embed the OS + arch so they are unambiguous on the release page.
#
# Apple code signing + notarization run only when the repo secrets are configured
# (APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_ID / APPLE_PASSWORD /
# APPLE_TEAM_ID); without them the dmg ships with Tauri's default ad-hoc signature.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.13"

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application signing identity found in the imported certificate."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build macOS bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri build --target ${{ matrix.target }} --bundles dmg -v

      - name: Stage artifact
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          hdiutil verify "$SRC"
          mkdir -p dist
          cp "$SRC" "dist/SealMail_${VERSION}_macos_${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable + NSIS installer
        run: bun run tauri build --bundles nsis

      - name: Stage artifacts
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist staging
          cp src-tauri/target/release/sealmail.exe "staging/SealMail.exe"
          7z a "dist/SealMail_${VERSION}_windows_x64.zip" ./staging/*
          INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          cp "$INSTALLER" "dist/SealMail_${VERSION}_windows_x64_setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
