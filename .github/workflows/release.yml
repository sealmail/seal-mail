name: Release

# Push a `v*` tag (e.g. `v0.1.0`) to build standalone clients and publish them to
# the matching GitHub Release:
#   - macOS : .dmg for Apple Silicon (aarch64) and Intel (x64) + updater .app.tar.gz
#   - Windows: standalone .zip plus an NSIS updater installer
#   - latest.json updater manifest consumed by tauri-plugin-updater
#
# Required repo secrets for the auto-updater (signatures verified in-app):
#   - TAURI_UPDATER_PUBKEY                 — contents of the updater public key
#   - TAURI_SIGNING_PRIVATE_KEY            — contents of the updater private key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD   — private key password (empty if none)
#
# Optional Apple signing/notarization secrets (skipped when absent):
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
#
# Optional OAuth client id baked into release builds:
#   GOOGLE_OAUTH_CLIENT_ID                 — Google Cloud Desktop OAuth client ID for Gmail Sign in with Google
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.13"

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application signing identity found in the imported certificate."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build macOS bundles
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$TAURI_UPDATER_PUBKEY" ] || [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_UPDATER_PUBKEY / TAURI_SIGNING_PRIVATE_KEY secrets are required for updater artifacts."
            exit 1
          fi
          # 公钥不入库：构建时通过 --config 覆盖注入
          printf '{"plugins":{"updater":{"pubkey":"%s"}}}' "$TAURI_UPDATER_PUBKEY" > "$RUNNER_TEMP/updater-config.json"
          # updater 的 .app.tar.gz 只在 `app` bundle 产出；dmg 用于手动安装
          bun run tauri build --target ${{ matrix.target }} --bundles app,dmg \
            --config "$RUNNER_TEMP/updater-config.json" -v

      - name: Stage artifacts
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          SRC=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          hdiutil verify "$SRC"
          cp "$SRC" "dist/SealMail_${VERSION}_macos_${{ matrix.arch }}.dmg"

          UPDATER=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type f -name "*.app.tar.gz" | sort | head -1)
          if [ -z "$UPDATER" ]; then
            echo "::error::Missing macOS updater artifact (bundle/macos/*.app.tar.gz)."
            exit 1
          fi
          if [ ! -f "$UPDATER.sig" ]; then
            echo "::error::Missing updater signature for $UPDATER. Check TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
            exit 1
          fi
          PLATFORM="darwin-${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }}"
          ASSET="SealMail_${VERSION}_${PLATFORM}.app.tar.gz"
          cp "$UPDATER" "dist/$ASSET"
          cp "$UPDATER.sig" "dist/$ASSET.sig"
          SIG=$(cat "$UPDATER.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="$VERSION" PLATFORM="$PLATFORM" ASSET="$ASSET" SIG="$SIG" PUB_DATE="$PUB_DATE" node -e '
            const fs = require("fs");
            const out = {
              version: process.env.VERSION,
              notes: "",
              pub_date: process.env.PUB_DATE,
              platforms: {
                [process.env.PLATFORM]: {
                  signature: process.env.SIG.trim(),
                  url: `https://github.com/sealmail/seal-mail/releases/download/${process.env.GITHUB_REF_NAME}/${process.env.ASSET}`
                }
              }
            };
            fs.writeFileSync(`dist/latest-${process.env.PLATFORM}.json`, JSON.stringify(out, null, 2));
          '

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable + NSIS updater installer
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$TAURI_UPDATER_PUBKEY" ] || [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_UPDATER_PUBKEY / TAURI_SIGNING_PRIVATE_KEY secrets are required for updater artifacts."
            exit 1
          fi
          printf '{"plugins":{"updater":{"pubkey":"%s"}}}' "$TAURI_UPDATER_PUBKEY" > "$RUNNER_TEMP/updater-config.json"
          bun run tauri build --bundles nsis --config "$RUNNER_TEMP/updater-config.json"

      - name: Stage artifacts
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist staging
          cp src-tauri/target/release/sealmail.exe "staging/SealMail.exe"
          7z a "dist/SealMail_${VERSION}_windows_x64.zip" ./staging/*
          INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          ASSET="SealMail_${VERSION}_windows_x64_setup.exe"
          cp "$INSTALLER" "dist/$ASSET"
          if [ ! -f "$INSTALLER.sig" ]; then
            echo "::error::Missing updater signature for $INSTALLER. Check TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
            exit 1
          fi
          cp "$INSTALLER.sig" "dist/$ASSET.sig"
          SIG=$(cat "$INSTALLER.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="$VERSION" PLATFORM="windows-x86_64" ASSET="$ASSET" SIG="$SIG" PUB_DATE="$PUB_DATE" node -e '
            const fs = require("fs");
            const out = {
              version: process.env.VERSION,
              notes: "",
              pub_date: process.env.PUB_DATE,
              platforms: {
                [process.env.PLATFORM]: {
                  signature: process.env.SIG.trim(),
                  url: `https://github.com/sealmail/seal-mail/releases/download/${process.env.GITHUB_REF_NAME}/${process.env.ASSET}`
                }
              }
            };
            fs.writeFileSync(`dist/latest-${process.env.PLATFORM}.json`, JSON.stringify(out, null, 2));
          '

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create updater manifest
        run: |
          set -euxo pipefail
          node -e '
            const fs = require("fs");
            const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");
            const out = { version, notes: "", pub_date: new Date().toISOString(), platforms: {} };
            for (const file of fs.readdirSync("dist").filter((f) => /^latest-.*\.json$/.test(f))) {
              const data = JSON.parse(fs.readFileSync(`dist/${file}`, "utf8"));
              Object.assign(out.platforms, data.platforms || {});
            }
            if (Object.keys(out.platforms).length === 0) {
              throw new Error("no per-platform updater manifests found");
            }
            fs.writeFileSync("dist/latest.json", JSON.stringify(out, null, 2));
          '

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/*.exe
            dist/*.sig
            dist/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
